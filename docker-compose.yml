version: "3.9"

services:
  # ── Kafka Stack ──────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on: [zookeeper]
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Internal listener for container-to-container, external for host
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  # ── Prefect ───────────────────────────────────────────────
  prefect-server:
    image: prefecthq/prefect:2.14.0-python3.10
    command: prefect server start --host 0.0.0.0
    ports:
      - "4200:4200"
    volumes:
      - prefect_data:/root/.prefect
    environment:
      PREFECT_UI_API_URL: http://localhost:4200/api

  prefect-worker:
    image: prefecthq/prefect:2.14.0-python3.10
    command: >
      bash -c "pip install kafka-python pandas pyarrow &&
               prefect worker start --pool default-agent-pool --name lab28-worker"
    environment:
      PREFECT_API_URL: http://prefect-server:4200/api
    volumes:
      - ./prefect/flows:/opt/prefect/flows
      - delta_lake_data:/opt/delta-lake
    depends_on: [prefect-server, kafka]

  # ── Vector Store (Qdrant) ─────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  # ── Feature Store (Feast via Redis) ──────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # ── Monitoring Stack ──────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    depends_on: [prometheus]
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SECURITY_ADMIN_USER: admin

  # ── API Gateway ───────────────────────────────────────────
  api-gateway:
    build: ./api-gateway
    ports:
      - "8000:8000"
    environment:
      VLLM_URL: ${VLLM_NGROK_URL:-http://placeholder:8001}
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379
    depends_on: [qdrant, redis]

volumes:
  prefect_data:
  qdrant_data:
  delta_lake_data:
